<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construst | Static Interactive Storefront</title>
    <meta
      name="description"
      content="Construst is a static, interactive furniture and materials storefront with a full product, cart, and checkout journey."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar" id="topbar"></header>
      <main id="app"></main>
      <footer id="footer"></footer>
    </div>

    <template id="toast-template">
      <div class="toast">
        <strong class="toast-title"></strong>
        <p class="toast-copy"></p>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
